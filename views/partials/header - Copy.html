<header class="header" id="header">
  <div class="container">
    <nav class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon"  style="border-radius: 50%;">
          TT
        </div>
        <span class="logo-text">THEOIN<span>CODE</span>LAND<span>.</span></span>
      </a>

      <!-- Desktop Navigation -->
      <div class="nav-desktop">
        <a href="/" class="nav-link <%= currentPath === '/' ? 'active' : '' %>">
          <span class="arrow">></span>
          <span class="text">Home</span>
          <span class="underline-bar"></span>
        </a>
        <a href="/projects" class="nav-link <%= currentPath === '/projects' ? 'active' : '' %>">
          <span class="arrow">></span>
          <span class="text">Projects</span>
          <span class="underline-bar"></span>
        </a>
        <a href="/dashboard" class="nav-link <%= currentPath === '/dashboard' ? 'active' : '' %>">
          <span class="arrow">></span>
          <span class="text">Workbench</span>
          <span class="underline-bar"></span>
        </a>
        <a href="/blog" class="nav-link <%= currentPath === '/blog' ? 'active' : '' %>">
          <span class="arrow">></span>
          <span class="text">Blog</span>
          <span class="underline-bar"></span>
        </a>

        <div class="theme-controls">
          <!-- Color Theme Picker Button -->
          <div class="theme-picker" style="position: relative;">
            <button class="theme-btn" id="themePickerBtn" aria-label="Change color theme">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;">
                <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
                <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
                <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
                <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.555C21.965 6.012 17.461 2 12 2z"/>
              </svg>
            </button>
            
            <!-- Dropdown Backdrop -->
            <div class="theme-dropdown-backdrop" id="themeDropdownBackdrop" style="position: fixed; inset: 0; z-index: 40; display: none;"></div>
            
            <!-- Theme Dropdown -->
            <div class="theme-dropdown" id="themeDropdown" style="position: absolute; right: 0; top: 48px; z-index: 50; width: 192px; border-radius: 8px; border: 1px solid var(--border); background: oklch(from var(--card) l c h / 0.95); backdrop-filter: blur(20px); box-shadow: 0 16px 48px oklch(0 0 0 / 0.2); padding: 0.75rem; display: none;">
              <div style="margin-bottom: 0.5rem; font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted-foreground);">Select Theme</div>
              <div style="display: flex; flex-direction: column; gap: 0.375rem;">
                <button class="theme-option" data-theme="golden" style="display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.625rem 0.75rem; border-radius: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; transition: all 0.2s ease;">
                  <div style="height: 20px; width: 20px; border-radius: 9999px; border: 2px solid var(--border); background: linear-gradient(to bottom right, oklch(0.85 0.15 80), oklch(0.7 0.18 70));"></div>
                  <span style="flex: 1; text-align: left; font-family: var(--font-mono); font-size: 0.875rem; color: var(--muted-foreground);">Golden</span>
                  <div class="theme-active-dot" style="height: 6px; width: 6px; border-radius: 9999px; background: var(--primary); display: none;"></div>
                </button>
                
                <button class="theme-option" data-theme="cyan" style="display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.625rem 0.75rem; border-radius: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; transition: all 0.2s ease;">
                  <div style="height: 20px; width: 20px; border-radius: 9999px; border: 2px solid var(--border); background: linear-gradient(to bottom right, oklch(0.75 0.14 195), oklch(0.6 0.16 240));"></div>
                  <span style="flex: 1; text-align: left; font-family: var(--font-mono); font-size: 0.875rem; color: var(--muted-foreground);">Cyan</span>
                  <div class="theme-active-dot" style="height: 6px; width: 6px; border-radius: 9999px; background: var(--primary); display: none;"></div>
                </button>
                
                <button class="theme-option" data-theme="purple" style="display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.625rem 0.75rem; border-radius: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; transition: all 0.2s ease;">
                  <div style="height: 20px; width: 20px; border-radius: 9999px; border: 2px solid var(--border); background: linear-gradient(to bottom right, oklch(0.7 0.2 290), oklch(0.6 0.22 280));"></div>
                  <span style="flex: 1; text-align: left; font-family: var(--font-mono); font-size: 0.875rem; color: var(--muted-foreground);">Purple</span>
                  <div class="theme-active-dot" style="height: 6px; width: 6px; border-radius: 9999px; background: var(--primary); display: none;"></div>
                </button>
                
                <button class="theme-option active" data-theme="emerald" style="display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.625rem 0.75rem; border-radius: 8px; border: 1px solid oklch(from var(--primary) l c h / 0.5); background: oklch(from var(--primary) l c h / 0.1); cursor: pointer; transition: all 0.2s ease;">
                  <div style="height: 20px; width: 20px; border-radius: 9999px; border: 2px solid var(--border); background: linear-gradient(to bottom right, oklch(0.72 0.16 160), oklch(0.6 0.18 150));"></div>
                  <span style="flex: 1; text-align: left; font-family: var(--font-mono); font-size: 0.875rem; color: var(--foreground); font-weight: 500;">Emerald</span>
                  <div class="theme-active-dot" style="height: 6px; width: 6px; border-radius: 9999px; background: var(--primary); display: block;"></div>
                </button>
                
                <button class="theme-option" data-theme="rose" style="display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.625rem 0.75rem; border-radius: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; transition: all 0.2s ease;">
                  <div style="height: 20px; width: 20px; border-radius: 9999px; border: 2px solid var(--border); background: linear-gradient(to bottom right, oklch(0.7 0.18 20), oklch(0.65 0.2 350));"></div>
                  <span style="flex: 1; text-align: left; font-family: var(--font-mono); font-size: 0.875rem; color: var(--muted-foreground);">Rose</span>
                  <div class="theme-active-dot" style="height: 6px; width: 6px; border-radius: 9999px; background: var(--primary); display: none;"></div>
                </button>
              </div>
            </div>
          </div>

          <!-- Dark/Light Toggle -->
          <button class="theme-btn" id="darkModeToggle" aria-label="Toggle dark mode">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; display: none;">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="header-right">
        <div class="social-links">
          <a href="<%= settings?.github_url || 'https://github.com' %>" target="_blank" rel="noopener noreferrer" class="social-link" title="GitHub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
            <span class="tooltip">GitHub</span>
          </a>
          <a href="<%= settings?.twitter_url || 'https://twitter.com' %>" target="_blank" rel="noopener noreferrer" class="social-link" title="Twitter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
            </svg>
            <span class="tooltip">Twitter</span>
          </a>
          <a href="<%= settings?.linkedin_url || 'https://linkedin.com' %>" target="_blank" rel="noopener noreferrer" class="social-link" title="LinkedIn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
              <rect x="2" y="9" width="4" height="12"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
            <span class="tooltip">LinkedIn</span>
          </a>
        </div>

        <div class="divider"></div>

        <div class="status-badge">
          <div class="status-dot">
            <span class="ping"></span>
            <span class="dot"></span>
          </div>
          <span>status: building</span>
        </div>

        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
          <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-menu-inner">
        <a href="/" class="mobile-nav-link <%= currentPath === '/' ? 'active' : '' %>">
          <span class="arrow">></span>
          Home
        </a>
        <a href="/projects" class="mobile-nav-link <%= currentPath === '/projects' ? 'active' : '' %>">
          <span class="arrow">></span>
          Projects
        </a>
        <a href="/dashboard" class="mobile-nav-link <%= currentPath === '/dashboard' ? 'active' : '' %>">
          <span class="arrow">></span>
          Workbench
        </a>
        <a href="/blog" class="mobile-nav-link <%= currentPath === '/blog' ? 'active' : '' %>">
          <span class="arrow">></span>
          Blog
        </a>

        <div class="mobile-social-links">
          <a href="<%= settings?.github_url || 'https://github.com' %>" target="_blank" class="mobile-social-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
          </a>
          <a href="<%= settings?.twitter_url || 'https://twitter.com' %>" target="_blank" class="mobile-social-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
            </svg>
          </a>
          <a href="<%= settings?.linkedin_url || 'https://linkedin.com' %>" target="_blank" class="mobile-social-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
              <rect x="2" y="9" width="4" height="12"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          </a>
        </div>

        <div class="mobile-status">
          <div class="status-dot">
            <span class="ping"></span>
            <span class="dot"></span>
          </div>
          <span>status: building</span>
        </div>
      </div>
    </div>
  </div>
</header>
